name: Android – Build APK & Release

# Runs when web or Android source changes land on main, or manually.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases and upload assets

jobs:
  build:
    name: Build debug APK & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          DATE=$(date +'%Y-%m-%d')
          SHA=$(git rev-parse --short HEAD)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "world-explorers-${DATE}-${SHA}.apk"
          echo "APK_NAME=world-explorers-${DATE}-${SHA}.apk" >> "$GITHUB_ENV"
          echo "TAG=apk-${DATE}-${SHA}"                       >> "$GITHUB_ENV"
          echo "DATE=${DATE}"                                  >> "$GITHUB_ENV"
          echo "SHA=${SHA}"                                    >> "$GITHUB_ENV"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "מגלי העולם — Android APK (${{ env.DATE }})"
          body: |
            ## Install on Android

            1. Download **`${{ env.APK_NAME }}`** below (tap the link on your phone, or transfer the file).
            2. On the phone: **Settings → Security → Install unknown apps** – enable for your browser or Files app.
            3. Tap the downloaded `.apk` and follow the installer.

            Built from commit [`${{ env.SHA }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).
          files: ${{ env.APK_NAME }}
          make_latest: true
